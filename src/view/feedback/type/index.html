{extend name="table"}

{block name="button"}
<!--{if auth("add")}-->
<button data-modal='{:url("add")}' data-title="{:lang('添加类型')}" class='layui-btn layui-btn-sm layui-btn-primary'>{:lang('添加类型')}</button>
<!--{/if}-->
<!--{if auth("remove")}-->
<a data-confirm="{:lang('确定要删除这些类型吗？')}" data-table-id="FeedbackTypeTable" data-action='{:url("remove")}' data-rule="id#{id}" class='layui-btn layui-btn-sm layui-btn-danger'>{:lang('批量删除')}</a>
<!--{/if}-->
{/block}

{block name="content"}
<div class="think-box-shadow">
    {include file='feedback/type/index_search'}
    <table id="FeedbackTypeTable" data-url="{:sysuri('index')}" data-target-search="form.form-search"></table>
</div>

<script type="text/html" id="toolbar">
    <!--{if auth("edit")}-->
    <a class="layui-btn layui-btn-sm" data-modal='{:url("edit")}?id={{d.id}}'>{:lang('编 辑')}</a>
    <!--{/if}-->
    <!--{if auth("remove")}-->
    <a class="layui-btn layui-btn-sm layui-btn-danger" data-confirm="{:lang('确定删除该类型？')}" data-action="{:url('remove')}" data-value="id#{{d.id}}">{:lang('删 除')}</a>
    <!--{/if}-->
</script>

<script type="text/html" id="SortInputTpl">
    <input type="number" data-blur-number="0"
           data-action-blur="{:sysuri()}"
           data-value="id#{{d.id}};action#sort;sort#{value}"
           data-loading="false" value="{{d.sort}}" class="layui-input text-center">
</script>

<script type="text/html" id="StatusSwitchTpl">
    <!--{if auth("state")}-->
    <input type="checkbox" value="{{d.id}}" lay-skin="switch" lay-text="{:lang('已启用')}|{:lang('已禁用')}" lay-filter="StatusSwitch" {{-d.status>0?'checked':''}}>
    <!--{else}-->
    {{-d.status ? '<b class="color-green">{:lang("已启用")}</b>' : '<b class="color-red">{:lang("已禁用")}</b>'}}
    <!--{/if}-->
</script>

<script>
    $(function () {
        $('#FeedbackTypeTable').layTable({
            even: true, height: 'full',
            sort: {field: 'sort', type: 'desc'},
            cols: [[
                {checkbox: true, fixed: true},
                {field: 'id', title: 'ID', width: 70, align: 'center', sort: true},
                {field: 'name', title: '{:lang("类型名称")}', width: 160},
                {field: 'code', title: '{:lang("类型编码")}', width: 160, align: 'center'},
                {field: 'sort', title: '{:lang("排序")}', width: 120, align: 'center', templet: '#SortInputTpl'},
                {field: 'status', title: '{:lang("状态")}', width: 120, align: 'center', templet: '#StatusSwitchTpl'},
                {field: 'create_at', title: '{:lang("创建时间")}', width: 160, align: 'center', sort: true},
                {toolbar: '#toolbar', title: '{:lang("操作面板")}'}
            ]]
        });
        layui.form.on('switch(StatusSwitch)', function (obj) {
            var data = {id: obj.value, status: obj.elem.checked > 0 ? 1 : 0};
            $.form.load("{:url('state')}", data, 'post', function (ret) {
                if (ret.code < 1) $.msg.error(ret.info, 3, function () {
                    $('#FeedbackTypeTable').trigger('reload');
                }); else $('#FeedbackTypeTable').trigger('reload');
                return false;
            }, false);
        });
    });
</script>
{/block}
