<form action="{:sysuri()}" method="post" data-auto="true" class="layui-form layui-card" data-table-id="FeedbackTypeTable">
    <div class="layui-card-body padding-left-40">

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('类型名称')}</label>
            <div class="layui-input-block">
                <input name="name" value="{$vo.name|default=''}" required vali-name="{:lang('类型名称')}" placeholder="{:lang('请输入类型名称')}" class="layui-input" maxlength="50">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('类型编码')}</label>
            <div class="layui-input-block">
                <input name="code" value="{$vo.code|default=''}" required vali-name="{:lang('类型编码')}" placeholder="{:lang('请输入英文编码，如 feedback')}" class="layui-input" pattern="^[a-z][a-z0-9_]*$" pattern-error="{:lang('编码格式：英文小写字母开头')}" maxlength="20" {notempty name='vo.code'}readonly style="background:#f5f5f5;"{/notempty}>
            </div>
            <div class="layui-form-mid layui-word-aux">{:lang('编辑时编码不可修改')}</div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('颜色样式')}</label>
            <div class="layui-input-block">
                <select name="class" lay-append-to>
                    <option value="layui-bg-blue" {if isset($vo.class) && $vo.class == 'layui-bg-blue'}selected{/if}>{:lang('蓝色')}</option>
                    <option value="layui-bg-green" {if isset($vo.class) && $vo.class == 'layui-bg-green'}selected{/if}>{:lang('绿色')}</option>
                    <option value="layui-bg-orange" {if isset($vo.class) && $vo.class == 'layui-bg-orange'}selected{/if}>{:lang('橙色')}</option>
                    <option value="layui-bg-red" {if isset($vo.class) && $vo.class == 'layui-bg-red'}selected{/if}>{:lang('红色')}</option>
                    <option value="layui-bg-cyan" {if isset($vo.class) && $vo.class == 'layui-bg-cyan'}selected{/if}>{:lang('青色')}</option>
                    <option value="layui-bg-purple" {if isset($vo.class) && $vo.class == 'layui-bg-purple'}selected{/if}>{:lang('紫色')}</option>
                    <option value="layui-bg-gray" {if isset($vo.class) && $vo.class == 'layui-bg-gray'}selected{/if}>{:lang('灰色')}</option>
                </select>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('排序权重')}</label>
            <div class="layui-input-block">
                <input type="number" name="sort" value="{$vo.sort|default='0'}" placeholder="{:lang('数字越大越靠前')}" class="layui-input" style="width:200px;">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('状态')}</label>
            <div class="layui-input-block">
                <input type="checkbox" name="status" value="1" lay-skin="switch" lay-text="{:lang('已启用')}|{:lang('已禁用')}" {if !isset($vo.status) || $vo.status == 1}checked{/if}>
            </div>
        </div>

    </div>

    <div class="hr-line-dashed"></div>

    {notempty name='vo.id'}<input type="hidden" value="{$vo.id}" name="id">{/notempty}

    <div class="layui-form-item text-center">
        <button class="layui-btn" type="submit">{:lang('保存数据')}</button>
        <button class="layui-btn layui-btn-danger" type="button" data-close>{:lang('取消编辑')}</button>
    </div>
</form>
