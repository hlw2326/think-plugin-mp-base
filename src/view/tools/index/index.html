{extend name="table"}

{block name="button"}
<!--{if auth("add")}-->
<button data-modal='{:url("add")}' data-title="{:lang('添加工具')}" class='layui-btn layui-btn-sm layui-btn-primary'>{:lang('添加工具')}</button>
<!--{/if}-->
<!--{if auth("remove")}-->
<a data-confirm="{:lang('确定要删除这些工具吗？')}" data-table-id="ToolsTable" data-action='{:url("remove")}' data-rule="id#{id}" class='layui-btn layui-btn-sm layui-btn-danger'>{:lang('批量删除')}</a>
<!--{/if}-->
{/block}

{block name="content"}
<div class="think-box-shadow">
    {include file='tools/index/index_search'}
    <table id="ToolsTable" data-url="{:sysuri('index')}" data-target-search="form.form-search"></table>
</div>

<script>
    $.jumpTypeLabel = (function () {
        var types = JSON.parse($('#JumpTypesData').text());
        return function (type) {
            var item = types[type] || {label: type, 'class': 'layui-bg-gray'};
            return '<span class="layui-badge ' + item['class'] + '">' + item.label + '</span>';
        };
    })();

    $(function () {
        $('#ToolsTable').layTable({
            even: true, height: 'full',
            sort: {field: 'sort', type: 'desc'},
            cols: [[
                {checkbox: true, fixed: true},
                {field: 'id', title: 'ID', width: 70, align: 'center', sort: true},
                {field: 'sort', title: '{:lang("排序")}', width: 120, align: 'center', templet: '#SortInputTpl'},
                {field: 'logo', title: '{:lang("Logo")}', width: 65, align: 'center', templet: '<div>{{-$.layTable.showImage(d.logo)}}</div>'},
                {field: 'name', title: '{:lang("工具名称")}', minWidth: 150},
                {field: 'cate_name', title: '{:lang("所属分类")}', width: 120, align: 'center'},
                {field: 'jump_type', title: '{:lang("跳转类型")}', width: 160, align: 'center', templet: '#JumpTypeTpl'},
                {field: 'click_count', title: '{:lang("点击次数")}', width: 120, align: 'center', sort: true},
                {field: 'status', title: '{:lang("状态")}', width: 120, align: 'center', templet: '#StatusSwitchTpl'},
                {field: 'create_at', title: '{:lang("创建时间")}', width: 160, align: 'center', sort: true},
                {toolbar: '#toolbar', title: '{:lang("操作面板")}', width: 300, align: 'left'}
            ]]
        });

        layui.form.on('switch(StatusSwitch)', function (obj) {
            var data = {id: obj.value, status: obj.elem.checked > 0 ? 1 : 0};
            $.form.load("{:url('state')}", data, 'post', function (ret) {
                if (ret.code < 1) $.msg.error(ret.info, 3, function () {
                    $('#ToolsTable').trigger('reload');
                }); else $('#ToolsTable').trigger('reload');
                return false;
            }, false);
        });
    });
</script>

<script type="text/html" id="SortInputTpl">
    <input type="number" min="0" data-blur-number="0" data-action-blur="{:sysuri()}" data-value="id#{{d.id}};action#sort;sort#{value}" data-loading="false" value="{{d.sort}}" class="layui-input text-center">
</script>

<label class="layui-hide">
    <textarea id="JumpTypesData">{:json_encode($jump_types, JSON_UNESCAPED_UNICODE)}</textarea>
</label>

<script type="text/html" id="JumpTypeTpl">
    {{- $.jumpTypeLabel(d.jump_type) }}
</script>

<script type="text/html" id="StatusSwitchTpl">
    <!--{if auth("state")}-->
    <input type="checkbox" value="{{d.id}}" lay-skin="switch" lay-text="{:lang('已启用')}|{:lang('已禁用')}" lay-filter="StatusSwitch" {{-d.status>0?'checked':''}}>
    <!--{else}-->
    {{-d.status ? '<b class="color-green">{:lang("已启用")}</b>' : '<b class="color-red">{:lang("已禁用")}</b>'}}
    <!--{/if}-->
</script>

<script type="text/html" id="toolbar">
    <!--{if auth("edit")}-->
    <a class="layui-btn layui-btn-sm" data-title="{:lang('编辑工具')}" data-modal='{:url("edit")}?id={{d.id}}'>{:lang('编 辑')}</a>
    <!--{/if}-->
    <!--{if auth("remove")}-->
    <a class="layui-btn layui-btn-sm layui-btn-danger" data-confirm="{:lang('确定要删除该工具吗？')}" data-action="{:url('remove')}" data-value="id#{{d.id}}">{:lang('删 除')}</a>
    <!--{/if}-->
</script>
{/block}
