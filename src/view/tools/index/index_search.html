<form class="layui-form layui-form-pane form-search" action="{:request()->url()}" onsubmit="return false" method="get" autocomplete="off">
    <fieldset>
        <legend>{:lang('条件搜索')}</legend>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">{:lang('工具名称')}</label>
            <div class="layui-input-inline">
                <input name="name" value="{$get.name|default=''}" placeholder="{:lang('请输入工具名称')}" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">{:lang('所属分类')}</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="cate_id" lay-append-to>
                    <option value="">-- {:lang('全部')} --</option>
                    {foreach $cates as $cate_id => $cate_name}
                    <option value="{$cate_id}" {if isset($get.cate_id) && $get.cate_id == $cate_id}selected{/if}>{$cate_name}</option>
                    {/foreach}
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">{:lang('跳转类型')}</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="jump_type" lay-append-to>
                    <option value="">-- {:lang('全部')} --</option>
                    {foreach $jump_types as $k => $v}
                    <option value="{$k}" {if isset($get.jump_type) && $get.jump_type == $k}selected{/if}>{$v.label}</option>
                    {/foreach}
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">{:lang('状态')}</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="status" lay-append-to>
                    <option value="">-- {:lang('全部')} --</option>
                    <option value="1" {if isset($get.status) && $get.status == '1'}selected{/if}>{:lang('已启用')}</option>
                    <option value="0" {if isset($get.status) && $get.status == '0'}selected{/if}>{:lang('已禁用')}</option>
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">{:lang('创建时间')}</label>
            <div class="layui-input-inline">
                <input data-date-range name="create_at" value="{$get.create_at|default=''}" placeholder="{:lang('请选择创建时间')}" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <button class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-search"></i>{:lang('搜 索')}</button>
        </div>

    </fieldset>
</form>
